name: Build FFmpegKit Android AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r23b
        run: |
          sdkmanager "ndk;23.2.8568313"

      - name: Set environment
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y autoconf automake libtool pkg-config unzip

      - name: Build FFmpegKit
        run: |
          chmod +x android.sh
          ./android.sh \
            --disable-arm-v7a \
            --disable-arm-v7a-neon \
            --disable-x86 \
            --disable-x86-64

      - name: Find AAR
        run: |
          find . -name "*.aar"

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-aar
          path: |
            **/*.aar
