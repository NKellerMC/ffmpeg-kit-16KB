name: Build FFmpegKit Android AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.3.11579264"

      - name: Build FFmpegKit
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: |
          chmod +x android.sh
          ./android.sh \
            --disable-arm-v7a \
            --disable-arm-v7a-neon \
            --disable-x86 \
            --disable-x86-64

      - name: Find generated files
        if: always()
        run: |
          find . -name "*.aar"
          find . -name "build.log"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpegkit-build-logs
          path: |
            **/build.log

      - name: Upload AAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpegkit-aar
          path: |
            **/*.aar
